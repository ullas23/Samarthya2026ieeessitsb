<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="#0a0a0a">
  <!-- Raven silhouette - minimal dark design -->
  <g>
    <!-- Body -->
    <ellipse cx="50" cy="35" rx="18" ry="10" fill="#0a0a0a"/>
    <!-- Head -->
    <circle cx="72" cy="28" r="7" fill="#0a0a0a"/>
    <!-- Beak -->
    <polygon points="79,27 90,29 79,31" fill="#0a0a0a"/>
    <!-- Eye -->
    <circle cx="74" cy="27" r="1.2" fill="#1a1a2e"/>
    <!-- Left Wing (upper) -->
    <path d="M48,30 Q30,10 10,5 Q25,18 35,28 Z" fill="#0a0a0a"/>
    <!-- Right Wing (lower, slightly back) -->
    <path d="M45,32 Q28,45 8,55 Q25,45 38,38 Z" fill="#111111"/>
    <!-- Tail feathers -->
    <path d="M32,35 Q22,38 15,42 Q20,36 28,33 Z" fill="#0a0a0a"/>
    <path d="M33,37 Q24,42 18,48 Q23,40 30,36 Z" fill="#111111"/>
    <!-- Wing detail feathers -->
    <path d="M50,28 Q38,14 18,8 Q32,16 42,26 Z" fill="#111111" opacity="0.6"/>
    <!-- Leg tuck (subtle) -->
    <path d="M55,43 L54,50 L56,50 L57,43" fill="#0a0a0a" opacity="0.5"/>
  </g>
</svg>
